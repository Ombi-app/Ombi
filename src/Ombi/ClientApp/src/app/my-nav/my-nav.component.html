<mat-sidenav-container *ngIf="showNav" class="sidenav-container">
    <mat-sidenav #drawer class="sidenav" fixedInViewport="true"
        [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'" [mode]="(isHandset$ | async) ? 'over' : 'side'"
        [opened]="!(isHandset$ | async)">

        <!-- Brand -->
        <div class="sidebar-brand" id="nav-applicationName">
            <a *ngIf="applicationUrl; else noApplicationUrlLogo" class="brand-link" [href]="applicationUrl">{{applicationName}}</a>
            <ng-template #noApplicationUrlLogo>
                <span class="brand-link">{{applicationName}}</span>
            </ng-template>
        </div>

        <!-- Navigation -->
        <nav class="sidebar-nav">
            <div class="nav-section-label">{{ 'NavigationBar.Discover' | translate | uppercase }}</div>

            <ng-container *ngFor="let nav of navItems">
                <ng-container *ngIf="(nav.requiresAdmin && isAdmin || !nav.requiresAdmin) && nav.enabled">
                    <!-- External link -->
                    <a *ngIf="nav.externalLink" class="nav-item" id="{{nav.id}}"
                        [href]="nav.link" target="_blank"
                        matTooltip="{{nav.toolTipMessage | translate}}" matTooltipPosition="right">
                        <i class="nav-icon {{nav.icon}}" aria-hidden="true"></i>
                        <span class="nav-label">{{nav.name | translate}}</span>
                        <i class="fas fa-external-link-alt nav-external-icon" aria-hidden="true"></i>
                    </a>

                    <!-- Internal link -->
                    <div *ngIf="!nav.externalLink" class="nav-item-wrapper">
                        <a class="nav-item" id="{{nav.id}}"
                            [routerLink]="nav.link" [routerLinkActive]="'nav-item--active'">
                            <span class="nav-indicator"></span>
                            <i class="nav-icon {{nav.icon}}"></i>
                            <span class="nav-label">{{nav.name | translate}}</span>
                        </a>
                        <button type="button" *ngIf="nav.id === 'nav-discover'" class="nav-action"
                            aria-label="Advanced search"
                            (click)="openAdvancedSearch()">
                            <i class="fas fa-filter"></i>
                        </button>
                    </div>
                </ng-container>
            </ng-container>

            <div class="nav-divider"></div>

            <button type="button" class="nav-item" id="nav-openMobile" (click)="openMobileApp($event);">
                <i class="nav-icon fas fa-mobile-alt"></i>
                <span class="nav-label">{{ 'NavigationBar.OpenMobileApp' | translate }}</span>
            </button>

            <button type="button" class="nav-item" id="nav-logout" (click)="logOut();">
                <i class="nav-icon fas fa-sign-out-alt"></i>
                <span class="nav-label">{{ 'NavigationBar.Logout' | translate }}</span>
            </button>
        </nav>

        <!-- Bottom quota section -->
        <div class="sidebar-footer">
            <app-remaining-requests [type]="RequestType.movie"></app-remaining-requests>
            <app-remaining-requests [type]="RequestType.tvShow"></app-remaining-requests>
            <app-remaining-requests [type]="RequestType.album"></app-remaining-requests>
        </div>
    </mat-sidenav>

    <mat-sidenav-content autosize class="content-container">
        <div class="top-bar">
            <button type="button" aria-label="Toggle sidenav" class="hamburger-btn" (click)="drawer.toggle()"
                *ngIf="isHandset$ | async">
                <i class="fas fa-bars"></i>
            </button>

            <div class="top-bar-search">
                <app-nav-search></app-nav-search>
            </div>

            <div class="filter-chips">
                <button type="button" id="filterMovies" class="chip" [class.active]="searchFilter.movies"
                    [attr.aria-label]="'NavigationBar.Filter.Movies' | translate"
                    [attr.aria-pressed]="searchFilter.movies"
                    (click)="toggleFilterChip(SearchFilterType.Movie)">
                    <i class="fas fa-film"></i>
                    <span class="chip-label">{{ 'NavigationBar.Filter.Movies' | translate}}</span>
                </button>
                <button type="button" id="filterTv" class="chip" [class.active]="searchFilter.tvShows"
                    [attr.aria-label]="'NavigationBar.Filter.TvShows' | translate"
                    [attr.aria-pressed]="searchFilter.tvShows"
                    (click)="toggleFilterChip(SearchFilterType.TvShow)">
                    <i class="fas fa-tv"></i>
                    <span class="chip-label">{{ 'NavigationBar.Filter.TvShows' | translate}}</span>
                </button>
                <button type="button" *ngIf="musicEnabled$ | async" id="filterMusic" class="chip" [class.active]="searchFilter.music"
                    [attr.aria-label]="'NavigationBar.Filter.Music' | translate"
                    [attr.aria-pressed]="searchFilter.music"
                    (click)="toggleFilterChip(SearchFilterType.Music)">
                    <i class="fas fa-music"></i>
                    <span class="chip-label">{{ 'NavigationBar.Filter.Music' | translate}}</span>
                </button>
            </div>

            <div class="top-bar-spacer"></div>

            <div class="profile-block">
                <a routerLink="/user-preferences" class="profile-link">
                    <span class="profile-username" data-test="profile-username">{{userName}}</span>
                    <div class="profile-avatar" data-test="profile-image">
                        <img [src]="userProfileImageUrl" (error)="onProfileImageError()" alt="Profile" width="32" height="32">
                    </div>
                </a>
            </div>
        </div>

        <!-- Page -->
        <ng-container *ngTemplateOutlet="template"></ng-container>

    </mat-sidenav-content>
</mat-sidenav-container>

<div *ngIf="!showNav">
    <ng-container *ngTemplateOutlet="template"></ng-container>
</div>

<ng-template #template>
    <router-outlet> </router-outlet>
</ng-template>
