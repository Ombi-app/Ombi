<ombi-image-background></ombi-image-background>
<div class="login-wrapper" *ngIf="form && customizationSettings && authenticationSettings">
  <div class="login-container">

    <div class="login-panel">
      <div class="login-header">
        <div class="brand-section">
          <img *ngIf="customizationSettings.logo" [src]="customizationSettings.logo" class="brand-logo" alt="Logo">
          <h1 *ngIf="!customizationSettings.logo" class="brand-title"
              [ngClass]="{
                'brand-title--long': customizationSettings.applicationName?.length >= 7 && customizationSettings.applicationName?.length < 14,
                'brand-title--xlong': customizationSettings.applicationName?.length >= 14
              }">
            {{ customizationSettings.applicationName || 'OMBI' }}
          </h1>
        </div>
        <p class="login-subtitle" [translate]="'Login.SignInButton'"></p>
      </div>

      <!-- OAuth selection view -->
      <div *ngIf="authenticationSettings.enableOAuth && !loginWithOmbi" class="login-body">
        <div class="oauth-buttons">
          <button class="btn-login btn-login--primary" type="button" data-cy="OmbiButton" (click)="loginWithOmbi = true">
            <mat-icon class="btn-icon">person</mat-icon>
            <span>{{'Login.SignInWith' | translate:appNameTranslate}}</span>
          </button>
          <div class="divider-row">
            <span class="divider-line"></span>
            <span class="divider-text">{{'Login.Or' | translate}}</span>
            <span class="divider-line"></span>
          </div>
          <button class="btn-login btn-login--plex" type="button" data-cy="oAuthPlexButton" (click)="oauth()">
            <span *ngIf="!oauthLoading">{{'Login.SignInWithPlex' | translate}}</span>
            <span *ngIf="oauthLoading" class="spinner-wrap">
              <span class="spinner"></span>
            </span>
          </button>
        </div>
      </div>

      <!-- Credentials form -->
      <div *ngIf="!authenticationSettings.enableOAuth || loginWithOmbi" class="login-body">
        <form *ngIf="authenticationSettings" class="login-form" novalidate [formGroup]="form" (ngSubmit)="onSubmit(form)">

          <div class="form-group">
            <div class="input-wrapper" [class.input-wrapper--focused]="usernameFocused" [class.input-wrapper--filled]="form.get('username').value" [class.input-wrapper--error]="form.get('username').hasError('required') && form.get('username').touched">
              <mat-icon class="input-icon">person_outline</mat-icon>
              <input id="username-field" type="text" formControlName="username"
                     class="login-input"
                     [placeholder]="'Login.UsernamePlaceholder' | translate"
                     [attr.aria-label]="'Login.UsernamePlaceholder' | translate"
                     (focus)="usernameFocused = true"
                     (blur)="usernameFocused = false"
                     autocomplete="username" />
            </div>
            <div class="field-error" *ngIf="form.get('username').hasError('required') && form.get('username').touched">
              {{'Login.Errors.UsernameRequired' | translate}}
            </div>
          </div>

          <div class="form-group" *ngIf="!authenticationSettings.allowNoPassword">
            <div class="input-wrapper" [class.input-wrapper--focused]="passwordFocused" [class.input-wrapper--filled]="form.get('password').value">
              <mat-icon class="input-icon">lock_outline</mat-icon>
              <input id="password-field" [type]="showPassword ? 'text' : 'password'" formControlName="password"
                     class="login-input"
                     [placeholder]="'Login.PasswordPlaceholder' | translate"
                     [attr.aria-label]="'Login.PasswordPlaceholder' | translate"
                     (focus)="passwordFocused = true"
                     (blur)="passwordFocused = false"
                     autocomplete="current-password" />
              <button type="button"
                      class="toggle-password"
                      (click)="showPassword = !showPassword"
                      [attr.aria-label]="showPassword ? ('Login.HidePassword' | translate) : ('Login.ShowPassword' | translate)">
                <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
              </button>
            </div>
          </div>

          <div class="form-options">
            <label class="custom-checkbox">
              <input type="checkbox" formControlName="rememberMe" />
              <span class="checkmark"></span>
              <span class="checkbox-label">{{'Login.RememberMe' | translate}}</span>
            </label>
            <a [routerLink]="['/reset']" class="forgot-link">{{'Login.ForgottenPassword' | translate}}</a>
          </div>

          <button id="sign-in" class="btn-submit" type="submit" data-cy="OmbiButton">
            <span>{{'Login.SignInButton' | translate}}</span>
            <mat-icon class="btn-arrow">arrow_forward</mat-icon>
          </button>
        </form>

        <div *ngIf="authenticationSettings.enableOAuth && loginWithOmbi" class="back-to-oauth">
          <button type="button" class="btn-back" (click)="loginWithOmbi = false">
            <mat-icon>arrow_back</mat-icon>
            <span>{{'Login.BackToSignInOptions' | translate}}</span>
          </button>
        </div>
      </div>
    </div>

  </div>
</div>
