<div id="detailed-{{request.mediaId}}" class="detailed-card" (click)="click()" (keydown.enter)="click()" (keydown.space)="onSpaceKey($event)" tabindex="0" role="button" [attr.aria-label]="request.title">
    <div class="card-image-wrapper">
        <ombi-image [src]="request.posterPath" [type]="request.type" class="card-poster" alt="{{request.title}}">
        </ombi-image>
        <div class="card-backdrop" [style.background-image]="background"></div>
    </div>

    <div class="card-status-badge badge-{{getClass(request)}}" id="detailed-request-status-{{request.mediaId}}">
        <span class="status-dot"></span>
        {{getStatus(request) | translate}}
    </div>

    <div class="card-info">
        <h4 class="card-title" id="detailed-request-title-{{request.mediaId}}">{{request.title}}</h4>
        <div class="card-meta">
            @if (request.releaseDate) {
                <span class="card-year">{{request.releaseDate | date:'yyyy'}}</span>
            }
            @if (request.username) {
                <span class="card-user" id="detailed-request-requestedby-{{request.mediaId}}">
                    <i class="fas fa-user" aria-hidden="true"></i> {{request.username}}
                </span>
            }
        </div>
        <div class="card-date" id="detailed-request-date-{{request.mediaId}}">
            {{request.requestDate | ombiDate: 'Ppp'}}
        </div>
    </div>

    @if (isAdmin && !request.approved && !request.denied) {
        <div class="card-actions">
            <button
                id="detailed-request-approve-{{request.mediaId}}"
                class="action-btn approve-btn"
                (click)="onApproveClick($event)"
                matTooltip="{{'Common.Approve' | translate}}">
                <i class="fas fa-check" aria-hidden="true"></i>
            </button>
            <button
                id="detailed-request-deny-{{request.mediaId}}"
                class="action-btn deny-btn"
                (click)="onDenyClick($event)"
                matTooltip="{{'Requests.Deny' | translate}}">
                <i class="fas fa-times" aria-hidden="true"></i>
            </button>
        </div>
    }
</div>
