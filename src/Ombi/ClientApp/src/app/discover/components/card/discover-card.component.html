
<div id="result{{result.id}}" *ngIf="fullyLoaded" class="card-wrapper" [style.display]="hide ? 'none' : 'block'">
    <div class="card-inner">
        <!-- Poster image -->
        <a [routerLink]="generateDetailsLink()" class="card-poster-link" [attr.aria-label]="result.title">
            <ombi-image [src]="result.posterPath" [type]="result.type" id="cardImage" class="card-poster" alt="{{result.title}}"></ombi-image>
        </a>

        <!-- Status badge -->
        <ng-container *ngIf="getStatusClass() as statusClass">
            <div class="status-badge {{statusClass}}" id="status{{result.id}}">
                <span class="status-dot"></span>
                <span class="status-label" id="availabilityStatus{{result.id}}">{{getAvailabilityStatus()}}</span>
            </div>
        </ng-container>

        <!-- Media type badge -->
        <div class="type-badge" id="type{{result.id}}-{{RequestType[result.type]}}">
            {{ 'Common.' + RequestType[result.type] | translate }}
        </div>

        <!-- Hover overlay -->
        <a class="card-overlay" [routerLink]="generateDetailsLink()">
            <div class="overlay-content">
                <div class="overlay-title" id="title{{result.id}}">{{result.title}}</div>
                <div class="overlay-overview" id="overview{{result.id}}">{{result.overview}}</div>
            </div>
        </a>

        <!-- Request button -->
        <div class="card-actions" *ngIf="!result.available && !result.approved && !result.requested">
            <div *ngIf="is4kEnabled && requestable && result.type === RequestType.movie;then show4K else regular"></div>
            <ng-template #show4K>
                <button [matMenuTriggerFor]="menu" id="requestButton{{result.id}}{{result.type}}{{discoverType}}" mat-raised-button class="request-btn">
                    <i *ngIf="!loading" class="fas fa-plus" aria-hidden="true"></i>
                    <i *ngIf="loading" class="fas fa-spinner fa-pulse" aria-hidden="true"></i>
                    <span>{{'Common.Request' | translate }}</span>
                </button>
                <mat-menu #menu="matMenu">
                    <button mat-menu-item class="request-menu-item" (click)="request($event, false)">{{'Common.Request' | translate }}</button>
                    <button mat-menu-item class="request-menu-item" (click)="request($event, true)">{{'Common.Request4K' | translate }}</button>
                </mat-menu>
            </ng-template>
            <ng-template #regular>
                <button id="requestButton{{result.id}}{{result.type}}{{discoverType}}" *ngIf="requestable" mat-raised-button class="request-btn" (click)="request($event, false)">
                    <i *ngIf="!loading" class="fas fa-plus" aria-hidden="true"></i>
                    <i *ngIf="loading" class="fas fa-spinner fa-pulse" aria-hidden="true"></i>
                    <span>{{'Common.Request' | translate }}</span>
                </button>
            </ng-template>
        </div>
    </div>
</div>
