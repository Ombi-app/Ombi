@if (discoverType() !== DiscoverType.Seasonal) {
    <div class="filter-bar">
        <mat-button-toggle-group name="discoverMode" (change)="toggleChanged($event)" [value]="discoverOptions()" class="filter-toggle-group">
            <mat-button-toggle [id]="id() + 'Combined'" [class.filter-active]="discoverOptions() === DiscoverOption.Combined" [value]="DiscoverOption.Combined" class="filter-toggle">{{'Discovery.Combined' | translate}}</mat-button-toggle>
            <mat-button-toggle [id]="id() + 'Movie'" [class.filter-active]="discoverOptions() === DiscoverOption.Movie" [value]="DiscoverOption.Movie" class="filter-toggle">{{'Discovery.Movies' | translate}}</mat-button-toggle>
            <mat-button-toggle [id]="id() + 'Tv'" [class.filter-active]="discoverOptions() === DiscoverOption.Tv" [value]="DiscoverOption.Tv" class="filter-toggle">{{'Discovery.Tv' | translate}}</mat-button-toggle>
        </mat-button-toggle-group>
    </div>
}

@defer (when hasResults(); prefetch on idle) {
    <div class="carousel-wrapper">
        <p-carousel #carousel [numVisible]="10" [numScroll]="10" [page]="0" [value]="discoverResults()" [responsiveOptions]="responsiveOptions" (onPage)="newPage()">
            <ng-template let-result pTemplate="item">
                <discover-card [discoverType]="discoverType()" [isAdmin]="isAdmin()" [result]="result" [is4kEnabled]="is4kEnabled()"></discover-card>
            </ng-template>
        </p-carousel>
    </div>
} @placeholder(minimum 300) {
    <div class="skeleton-row">
        @for (item of [1,2,3,4,5,6,7]; track item) {
            <div class="skeleton-card">
                <p-skeleton width="100%" height="270px" borderRadius="8px"></p-skeleton>
            </div>
        }
    </div>
}
