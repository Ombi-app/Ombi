@if (loaded() && activeItem()) {
    <div class="hero-banner" [style.background-image]="'url(' + backdropUrl() + ')'">
        <div class="hero-overlay">
            <div class="hero-content">
                <h1 class="hero-title">{{ activeItem().title }}</h1>
                <div class="hero-meta">
                    @if (activeItem().year) {
                        <span class="hero-year">{{ activeItem().year }}</span>
                    }
                    @if (activeItem().rating) {
                        <span class="hero-rating">
                            <i class="fas fa-star"></i> {{ getRatingDisplay() }}
                        </span>
                    }
                </div>
                <p class="hero-overview">{{ activeItem().overview }}</p>
                <a [routerLink]="getDetailsLink()" class="hero-cta">
                    {{ 'Discovery.ViewDetails' | translate }}
                    <i class="fas fa-arrow-right"></i>
                </a>
            </div>
            <div class="hero-indicators">
                @for (item of items(); track item.id; let i = $index) {
                    <button
                        type="button"
                        class="hero-indicator"
                        [class.active]="i === activeIndex()"
                        (click)="selectItem(i)"
                        [attr.aria-label]="item.title">
                    </button>
                }
            </div>
        </div>
    </div>
}
