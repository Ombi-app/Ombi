<!-- Filter Bar -->
<div class="filter-bar">
  <div class="filter-chips">
    <button *ngFor="let filter of filterOptions" type="button" class="chip"
      [id]="filter.id" [class.active]="currentFilter === filter.type"
      [attr.aria-pressed]="currentFilter === filter.type"
      (click)="switchFilter(filter.type)">
      {{ filter.label | translate }}
    </button>
  </div>

  <div class="filter-actions">
    <mat-form-field class="display-count" appearance="outline">
      <mat-select
        [(value)]="gridCount"
        (selectionChange)="onGridCountChange()"
      >
        <mat-option *ngFor="let count of gridCountOptions" [value]="count">{{ count }}</mat-option>
      </mat-select>
    </mat-form-field>
  </div>
</div>

<!-- Loading State -->
<grid-spinner [loading]="isLoadingResults"></grid-spinner>

<!-- Card Grid -->
<div class="card-grid" *ngIf="dataSource.length > 0">
  <div class="request-card" *ngFor="let item of dataSource">
    <!-- Cover Art -->
    <a class="card-poster" [routerLink]="'/details/artist/' + item.foreignArtistId">
      <img *ngIf="item.cover" [src]="item.cover" [alt]="item.title" loading="lazy" />
      <div *ngIf="!item.cover" class="no-poster">
        <i class="fas fa-music"></i>
      </div>
      <div class="poster-overlay">
        <span class="view-details">{{ 'Requests.Details' | translate }}</span>
      </div>
    </a>

    <!-- Card Body -->
    <div class="card-body">
      <div class="card-header">
        <h3 class="card-title"><a [routerLink]="'/details/artist/' + item.foreignArtistId">{{ item.title }}</a></h3>
        <span class="card-artist">{{ item.artistName }}</span>
        <span class="card-year">{{ item.releaseDate | ombiDate: 'P' }}</span>
      </div>

      <!-- Status Badge -->
      <div class="status-row">
        <span class="status-badge" [ngClass]="getStatusClass(item)">
          {{ item.requestStatus | translate }}
        </span>
      </div>

      <!-- Meta Info -->
      <div class="card-meta">
        <div class="meta-item">
          <i class="fas fa-user"></i>
          <span>{{ item.requestedUser?.userAlias }}</span>
        </div>
        <div class="meta-item">
          <i class="fas fa-calendar-alt"></i>
          <span>{{ item.requestedDate | ombiDate: 'PP' }}</span>
        </div>
      </div>

      <!-- Actions -->
      <div class="card-actions">
        <button class="btn-detail" type="button" [routerLink]="'/details/artist/' + item.foreignArtistId">
          {{ 'Requests.Details' | translate }}
        </button>
        <button class="btn-options" type="button"
          [attr.aria-label]="'Requests.Options' | translate"
          (click)="openOptions(item)"
          *ngIf="isAdmin || (manageOwnRequests && item.requestedUser?.userName === userName)">
          <i class="fas fa-ellipsis-h"></i>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Empty State -->
<div class="empty-state" *ngIf="dataSource.length === 0 && !isLoadingResults">
  <i class="fas fa-music empty-icon"></i>
  <h3>{{ 'Requests.NoRequests' | translate }}</h3>
</div>

<!-- Paginator -->
<mat-paginator [length]="resultsLength" [pageSize]="gridCount" showFirstLastButtons></mat-paginator>
